# Job d'initialisation : cree le bucket "velero" dans MinIO au premier
# deploiement (idempotent : "mb --ignore-existing" ne fait rien s'il existe).
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: minio
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:RELEASE.2025-08-13T08-35-41Z
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set local http://minio.minio.svc.cluster.local:9000 minioadmin minioadmin-lab; do
                echo "MinIO pas encore pret, on attend..."; sleep 5;
              done
              mc mb --ignore-existing local/velero
              echo "Bucket velero pret."
