# Service MinIO : port 9000 = API S3 (utilisee par Velero),
# port 9001 = console web (pour visualiser les backups).
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: minio
  labels:
    app: minio
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
