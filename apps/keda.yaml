# Autoscaling evenementiel : KEDA (CNCF graduated), via son chart officiel.
# KEDA etend le HPA : il sait scaler sur n'importe quel evenement/metrique
# externe (files de messages, Prometheus, cron...) et descendre a ZERO pod.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keda
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://kedacore.github.io/charts
    chart: keda
    targetRevision: 2.20.1
    helm:
      valuesObject:
        resources:
          operator:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 300m, memory: 512Mi }
          metricServer:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 300m, memory: 512Mi }
          webhooks:
            requests: { cpu: 25m, memory: 64Mi }
            limits:   { cpu: 100m, memory: 128Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: keda
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # CRDs KEDA volumineuses
    retry:
      limit: 5
      backoff: { duration: 30s, factor: 2, maxDuration: 5m }
